<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>AuraBaby Anime</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="bg-stars s1"></div>
  <div class="bg-stars s2"></div>
  <div class="nebula"></div>
  <div id="petals"></div>

  <!-- HEADER -->
  <header>
    <div class="logo">
      <span class="logo-main">AuraBaby</span>
      <span class="logo-sub">✦ ANIME ✦</span>
    </div>
    <div class="search-wrap">
      <input id="searchInput" type="text" placeholder="Search anime..." autocomplete="off"/>
      <button id="searchBtn">⌕</button>
    </div>
  </header>

  <!-- TABS -->
  <nav id="tabs">
    <button class="tab active" data-mode="trending">🔥 TRENDING</button>
    <button class="tab" data-mode="popular">⭐ POPULAR</button>
    <button class="tab" data-mode="recent">🆕 RECENT</button>
  </nav>

  <!-- GRID -->
  <main id="grid"></main>

  <!-- LOADING -->
  <div id="loadingScreen" class="loading-screen hidden">
    <div class="spin-ring"></div>
    <p id="loadingMsg">Loading...</p>
  </div>

  <!-- ANIME DETAIL OVERLAY -->
  <div id="detailOverlay" class="overlay hidden">
    <div class="overlay-box">
      <button class="close-btn" id="closeDetail">✕</button>
      <div class="detail-left">
        <img id="detailPoster" src="" alt=""/>
      </div>
      <div class="detail-right">
        <h2 id="detailTitle"></h2>
        <div class="detail-meta">
          <span id="detailScore"></span>
          <span id="detailYear"></span>
          <span id="detailStatus"></span>
        </div>
        <p id="detailDesc"></p>
        <div id="episodeSection">
          <div class="ep-header">
            <h3>EPISODES</h3>
            <span id="epLoading" class="ep-loading">loading...</span>
          </div>
          <div id="episodeList" class="episode-grid"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- PLAYER OVERLAY -->
  <div id="playerOverlay" class="overlay hidden">
    <div class="player-box">
      <div class="player-header">
        <button class="back-btn" id="backToDetail">← BACK</button>
        <span id="playerTitle">Now Playing</span>
        <button class="fullscreen-btn" id="fsBtn">⛶</button>
      </div>
      <div class="player-wrap" id="playerWrap">
        <video id="videoPlayer" controls autoplay playsinline></video>
        <div id="playerLoading" class="player-loading">
          <div class="spin-ring sm"></div>
          <p>Fetching stream...</p>
        </div>
        <div id="playerError" class="player-error hidden">
          <p>⚠️ Stream unavailable</p>
          <button id="tryBackup">Try Backup Source</button>
        </div>
      </div>
      <div id="qualityBar" class="quality-bar"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
